document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

97F, U+1CD0-1CF9, U+200C-200D, U+20A8, U+20B9, U+20F0, U+25CC, U+A830-A839, U+A8E0-A8FF, U+11B00-11B09;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Poppins';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"7b72f40f-e47b-4e9f-a79a-de53486b988c\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Poppins';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"872f4b43-ca03-45b9-80a4-c160c3cf4061\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* devanagari */\n@font-face {\n  font-family: 'Poppins';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"89260ebc-59e5-48ad-a5d3-9377319e7dc6\") format('woff2');\n  unicode-range: U+0900-097F, U+1CD0-1CF9, U+200C-200D, U+20A8, U+20B9, U+20F0, U+25CC, U+A830-A839, U+A8E0-A8FF, U+11B00-11B09;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Poppins';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"9578c72e-e0d7-4561-83e8-8730d6bdd6d6\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Poppins';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"3b7c5f04-c12b-422f-a89f-3c9a9f28ee10\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *, *::before, *::after { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  body { font-family: 'Poppins', system-ui, sans-serif; color: #424242; background: #f4f3f0; -webkit-font-smoothing: antialiased; }\n  @keyframes oyaFade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }\n  @keyframes oyaModalIn { from { opacity: 0; transform: translateY(12px) scale(.98); } to { opacity: 1; transform: none; } }\n  @keyframes oyaOverlay { from { opacity: 0; } to { opacity: 1; } }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh; background:#f4f3f0; display:flex; flex-direction:column; align-items:center;\">\n  <div style=\"width:100%; max-width:1120px; background:#ffffff; min-height:100vh; display:flex; flex-direction:column; box-shadow:0 0 40px rgba(0,0,0,0.04);\">\n\n    <!-- HEADER -->\n    <header style=\"display:flex; align-items:center; justify-content:space-between; gap:16px; padding:16px clamp(20px,4vw,40px); border-bottom:1px solid #E8E8E8;\">\n      <div style=\"display:flex; align-items:center; gap:10px;\">\n        <div style=\"width:36px; height:36px; border-radius:50%; background:#2E7D33; display:flex; align-items:center; justify-content:center; flex:none;\">\n          <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\">\n            <polyline points=\"2,13 7,13 10,5 14,19 17,11 22,11\" stroke=\"#ffffff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; line-height:1.1;\">\n          <span style=\"font-size:16px; font-weight:700; color:#2E7D33; letter-spacing:.2px;\">OYA<span style=\"color:#424242; font-weight:600;\"> Diagnostic<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <span style=\"font-size:13px; font-weight:500; color:#888888;\">Vos résultats<\u002Fspan>\n    <\u002Fheader>\n\n    <!-- PROGRESS (100%) -->\n    <div style=\"height:8px; width:100%; background:#E8E8E8;\">\n      <div style=\"height:100%; width:100%; background:#38AA3F;\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- BODY -->\n    <main style=\"flex:1; padding:clamp(24px,4vw,44px) clamp(20px,4vw,40px) 40px; animation:oyaFade .3s ease both;\">\n\n      <!-- Title -->\n      <div style=\"text-align:center; max-width:620px; margin:0 auto 8px;\">\n        <h1 style=\"margin:0; font-size:clamp(22px,3.4vw,28px); font-weight:600; color:#424242; line-height:1.2;\">Voici vos 3 orientations<\u002Fh1>\n        <svg width=\"120\" height=\"10\" viewBox=\"0 0 120 10\" fill=\"none\" style=\"display:block; margin:14px auto 14px;\" aria-hidden=\"true\">\n          <path d=\"M2 6 Q 17 -1 32 6 T 62 6 T 92 6 T 118 6\" stroke=\"#EF8D11\" stroke-width=\"2.5\" stroke-linecap=\"round\" fill=\"none\"><\u002Fpath>\n        <\u002Fsvg>\n        <p style=\"margin:0; font-size:14px; color:#888888; line-height:1.6;\">D'après vos réponses, voici les métiers de la chaîne « de la fourche à l'assiette » qui correspondent le mieux à votre profil.<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- Cards -->\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:16px; margin-top:28px;\">\n        <sc-for list=\"{{ cards }}\" as=\"card\" hint-placeholder-count=\"3\">\n          <article style=\"border:2px solid #E8E8E8; border-radius:14px; padding:22px; display:flex; flex-direction:column; gap:14px; background:#ffffff;\">\n            <!-- rank + métier -->\n            <div style=\"display:flex; align-items:center; gap:10px;\">\n              <span style=\"width:26px; height:26px; border-radius:50%; flex:none; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; background:{{ card.barColor }}; color:{{ card.badgeColor }};\">{{ card.rank }}<\u002Fspan>\n              <h2 style=\"margin:0; font-size:16px; font-weight:600; color:#424242;\">{{ card.metier }}<\u002Fh2>\n            <\u002Fdiv>\n\n            <!-- score bar + niveau -->\n            <div style=\"display:flex; align-items:center; gap:14px; flex-wrap:wrap;\">\n              <div style=\"flex:1; min-width:150px; display:flex; align-items:center; gap:10px;\">\n                <div style=\"flex:1; height:12px; border-radius:6px; background:#F0EFEC; overflow:hidden;\">\n                  <div style=\"height:100%; width:{{ card.barWidth }}; background:{{ card.barColor }}; border-radius:6px;\"><\u002Fdiv>\n                <\u002Fdiv>\n                <span style=\"font-size:18px; font-weight:700; color:#424242; white-space:nowrap;\">{{ card.scoreText }}<\u002Fspan>\n              <\u002Fdiv>\n              <span style=\"font-size:13px; font-weight:600; color:#2E7D33; background:#F0FFF4; padding:4px 10px; border-radius:6px; white-space:nowrap;\">Niveau {{ card.niveau }}<\u002Fspan>\n            <\u002Fdiv>\n\n            <!-- visible attributes -->\n            <div style=\"display:flex; flex-direction:column; gap:7px; border-top:1px solid #F0EFEC; padding-top:12px;\">\n              <sc-for list=\"{{ card.attrsVisible }}\" as=\"attr\" hint-placeholder-count=\"2\">\n                <div style=\"display:flex; gap:8px; font-size:14px;\">\n                  <span style=\"font-weight:600; color:#888888; min-width:92px;\">{{ attr.label }}<\u002Fspan>\n                  <span style=\"color:#424242;\">{{ attr.value }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n\n              <sc-if value=\"{{ card.expanded }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display:flex; flex-direction:column; gap:7px; animation:oyaFade .2s ease both;\">\n                  <sc-for list=\"{{ card.attrsDetail }}\" as=\"attr\" hint-placeholder-count=\"3\">\n                    <div style=\"display:flex; gap:8px; font-size:14px;\">\n                      <span style=\"font-weight:600; color:#888888; min-width:92px;\">{{ attr.label }}<\u002Fspan>\n                      <span style=\"color:#424242;\">{{ attr.value }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n\n            <button type=\"button\" onclick=\"{{ card.toggle }}\" style=\"align-self:flex-start; background:none; border:none; padding:2px 0; font-family:inherit; font-size:14px; font-weight:600; color:#A85D08; cursor:pointer; text-decoration:underline; text-underline-offset:3px;\" style-focus=\"outline:2px solid #EF8D11; outline-offset:2px;\">{{ card.detailsLabel }}<\u002Fbutton>\n          <\u002Farticle>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- Peurs identifiées -->\n      <section style=\"margin-top:28px; background:#FFFBF8; border:1px solid #F1E3DA; border-radius:14px; padding:clamp(18px,3vw,24px); position:relative; overflow:hidden;\">\n        <svg width=\"40\" height=\"40\" viewBox=\"0 0 40 40\" fill=\"none\" style=\"position:absolute; top:14px; right:16px;\" aria-hidden=\"true\">\n          <path d=\"M34 6 C 18 8 8 18 8 32 C 22 32 34 22 34 6 Z\" fill=\"#E4F3E5\"><\u002Fpath>\n          <path d=\"M30 11 C 20 16 14 23 11 30\" stroke=\"#38AA3F\" stroke-width=\"1.6\" stroke-linecap=\"round\" fill=\"none\"><\u002Fpath>\n        <\u002Fsvg>\n        <h2 style=\"margin:0 0 6px; font-size:20px; font-weight:600; color:#2E7D33;\">Vos préoccupations identifiées<\u002Fh2>\n        <p style=\"margin:0 0 16px; font-size:14px; color:#888888; line-height:1.6; max-width:560px;\">Nous avons noté ces points de vigilance dans votre parcours. Votre rapport complet inclut des conseils pour les lever.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:10px;\">\n          <sc-for list=\"{{ peurs }}\" as=\"peur\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex; align-items:center; gap:10px; font-size:14px; color:#424242;\">\n              <span style=\"width:20px; height:20px; border-radius:5px; flex:none; background:#38AA3F; display:flex; align-items:center; justify-content:center; color:#ffffff; font-size:12px; font-weight:700;\">✓<\u002Fspan>\n              {{ peur }}\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- CTA -->\n      <div style=\"display:flex; justify-content:center; margin-top:32px;\">\n        <button type=\"button\" onclick=\"{{ openModal }}\" style=\"background:{{ cta }}; color:#ffffff; border:none; border-radius:8px; min-height:56px; padding:0 32px; font-family:inherit; font-size:14px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:10px;\" style-hover=\"filter:brightness(.92);\" style-focus=\"outline:2px solid #EF8D11; outline-offset:2px;\">\n          Recevoir mon diagnostic\n          <span aria-hidden=\"true\">→<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fmain>\n\n    <!-- FOOTER -->\n    <footer style=\"border-top:1px solid #E8E8E8; padding:18px clamp(20px,4vw,40px); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; font-size:13px; color:#888888;\">\n      <span>Conditions / À propos<\u002Fspan>\n      <span>Contact : hello@oya-diagnostic.fr<\u002Fspan>\n    <\u002Ffooter>\n  <\u002Fdiv>\n\n  <!-- MODAL EMAIL / RGPD -->\n  <sc-if value=\"{{ modalOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed; inset:0; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; padding:16px; z-index:50; animation:oyaOverlay .2s ease both;\" onclick=\"{{ closeModal }}\">\n      <div role=\"dialog\" aria-modal=\"true\" style=\"width:min(400px,100%); background:#ffffff; border-radius:8px; padding:clamp(20px,5vw,32px); box-shadow:0 12px 40px rgba(0,0,0,0.22); animation:oyaModalIn .22s ease both;\" onclick=\"{{ stop }}\">\n\n        <sc-if value=\"{{ showForm }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex; flex-direction:column; gap:16px;\">\n            <div style=\"display:flex; align-items:flex-start; justify-content:space-between; gap:12px;\">\n              <h2 style=\"margin:0; font-size:18px; font-weight:600; color:#2E7D33;\">Recevoir votre diagnostic<\u002Fh2>\n              <button type=\"button\" onclick=\"{{ closeModal }}\" aria-label=\"Fermer\" style=\"background:none; border:none; font-size:20px; line-height:1; color:#888888; cursor:pointer; padding:0;\" style-focus=\"outline:2px solid #EF8D11; outline-offset:2px;\">×<\u002Fbutton>\n            <\u002Fdiv>\n            <p style=\"margin:0; font-size:14px; color:#888888; line-height:1.6;\">Indiquez votre email pour recevoir votre dossier complet (PDF) avec les 87 métiers analysés.<\u002Fp>\n\n            <div style=\"display:flex; flex-direction:column; gap:6px;\">\n              <label for=\"oya-email\" style=\"font-size:14px; font-weight:600; color:#424242;\">Email <span style=\"color:#A85D08;\">*<\u002Fspan><\u002Flabel>\n              <input id=\"oya-email\" type=\"email\" value=\"{{ email }}\" oninput=\"{{ onEmail }}\" placeholder=\"vous@exemple.fr\" style=\"width:100%; min-height:44px; border:2px solid #E8E8E8; border-radius:8px; padding:10px 14px; font-family:inherit; font-size:14px; color:#424242;\" style-focus=\"border-color:#EF8D11; outline:2px solid #EF8D11; outline-offset:2px;\">\n              <span style=\"font-size:12px; font-style:italic; color:#888888;\">Format : vous@exemple.fr<\u002Fspan>\n            <\u002Fdiv>\n\n            <label style=\"display:flex; align-items:flex-start; gap:10px; font-size:14px; color:#424242; line-height:1.5; cursor:pointer;\">\n              <input type=\"checkbox\" checked=\"{{ rgpd }}\" onchange=\"{{ toggleRgpd }}\" style=\"width:18px; height:18px; margin-top:2px; accent-color:#38AA3F; flex:none; cursor:pointer;\">\n              <span>J'accepte de recevoir mon diagnostic et que mes réponses soient utilisées à titre statistique (RGPD art. 7).<\u002Fspan>\n            <\u002Flabel>\n\n            <label style=\"display:flex; align-items:flex-start; gap:10px; font-size:14px; color:#424242; line-height:1.5; cursor:pointer;\">\n              <input type=\"checkbox\" checked=\"{{ optin }}\" onchange=\"{{ toggleOptin }}\" style=\"width:18px; height:18px; margin-top:2px; accent-color:#38AA3F; flex:none; cursor:pointer;\">\n              <span>Être tenu(e) au courant des formations OYA.<\u002Fspan>\n            <\u002Flabel>\n\n            <sc-if value=\"{{ error }}\" hint-placeholder-val=\"\">\n              <p role=\"alert\" style=\"margin:0; font-size:13px; color:#B5241B; background:#FCEEEC; border-radius:6px; padding:8px 12px;\">{{ error }}<\u002Fp>\n            <\u002Fsc-if>\n\n            <div style=\"display:flex; gap:12px; margin-top:4px;\">\n              <button type=\"button\" onclick=\"{{ submit }}\" disabled=\"{{ sendDisabled }}\" style=\"flex:1; background:{{ ctaBtn }}; color:#ffffff; border:none; border-radius:8px; min-height:52px; font-family:inherit; font-size:14px; font-weight:600; cursor:{{ sendCursor }};\" style-hover=\"filter:brightness(.94);\" style-focus=\"outline:2px solid #EF8D11; outline-offset:2px;\">Envoyer<\u002Fbutton>\n              <button type=\"button\" onclick=\"{{ closeModal }}\" style=\"background:#ffffff; color:#424242; border:2px solid #E8E8E8; border-radius:8px; min-height:52px; padding:0 18px; font-family:inherit; font-size:14px; font-weight:600; cursor:pointer;\" style-hover=\"border-color:#888888;\" style-focus=\"outline:2px solid #EF8D11; outline-offset:2px;\">Annuler<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ sent }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex; flex-direction:column; align-items:center; text-align:center; gap:14px; padding:8px 0;\">\n            <span style=\"width:60px; height:60px; border-radius:50%; background:#E4F3E5; display:flex; align-items:center; justify-content:center; color:#2E7D33; font-size:30px;\">✓<\u002Fspan>\n            <h2 style=\"margin:0; font-size:18px; font-weight:600; color:#2E7D33;\">Diagnostic envoyé !<\u002Fh2>\n            <p style=\"margin:0; font-size:14px; color:#888888; line-height:1.6;\">Votre dossier part vers<br><strong style=\"color:#424242;\">{{ email }}<\u002Fstrong><\u002Fp>\n            <p style=\"margin:0; font-size:12px; color:#888888;\">Pensez à vérifier vos courriers indésirables.<\u002Fp>\n            <button type=\"button\" onclick=\"{{ closeModal }}\" style=\"background:{{ cta }}; color:#ffffff; border:none; border-radius:8px; min-height:52px; padding:0 28px; font-family:inherit; font-size:14px; font-weight:600; cursor:pointer; margin-top:4px;\" style-hover=\"filter:brightness(.92);\" style-focus=\"outline:2px solid #EF8D11; outline-offset:2px;\">Fermer<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 1120, &quot;height&quot;: 920 },\n  &quot;rank3Color&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#E8D4C8&quot;, &quot;options&quot;: [&quot;#E8D4C8&quot;, &quot;#D9B3A3&quot;, &quot;#E0C9A6&quot;, &quot;#C9B7A8&quot;], &quot;tsType&quot;: &quot;string&quot; },\n  &quot;ctaColor&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#A85D08&quot;, &quot;options&quot;: [&quot;#A85D08&quot;, &quot;#EF8D11&quot;], &quot;tsType&quot;: &quot;string&quot; },\n  &quot;detailsDefaultOpen&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot; }\n}\">\nclass Component extends DCLogic {\n  state = { modalOpen: false, email: \"\", rgpd: false, optin: true, error: \"\", sent: false, expanded: {} };\n\n  toggleCard(rank) {\n    this.setState(s => ({ expanded: { ...s.expanded, [rank]: !s.expanded[rank] } }));\n  }\n\n  renderVals() {\n    const raw = [\n      { rank: 1, metier: \"Maraîcher bio\", score: 92, niveau: \"Bac\",\n        secteur: \"Production\", autonomie: \"Solo\", penurie: \"En tension\",\n        evolution: \"Émergent\", competences: \"Agroécologie, gestion des sols, vente directe\" },\n      { rank: 2, metier: \"Logisticien agroalimentaire\", score: 78, niveau: \"Bac+2\",\n        secteur: \"Distribution\", autonomie: \"Équipe\", penurie: \"Stable\",\n        evolution: \"Croissant\", competences: \"Planification, outils numériques, communication\" },\n      { rank: 3, metier: \"Cuisinier bio\", score: 65, niveau: \"CAP\",\n        secteur: \"Restauration\", autonomie: \"Équipe\", penurie: \"Stable\",\n        evolution: \"Stable\", competences: \"Cuisine saine, gestion des stocks, relation client\" },\n    ];\n    const barColors = { 1: \"#EF8D11\", 2: \"#38AA3F\", 3: (this.props.rank3Color ?? \"#E8D4C8\") };\n    const badgeColors = { 1: \"#ffffff\", 2: \"#ffffff\", 3: \"#424242\" };\n    const detailsOpen = this.props.detailsDefaultOpen ?? false;\n\n    const cards = raw.map(m => {\n      const expanded = !!this.state.expanded[m.rank] || detailsOpen;\n      return {\n        rank: m.rank,\n        metier: m.metier,\n        scoreText: m.score + \"/100\",\n        barWidth: m.score + \"%\",\n        barColor: barColors[m.rank],\n        badgeColor: badgeColors[m.rank],\n        niveau: m.niveau,\n        attrsVisible: [\n          { label: \"Secteur\", value: m.secteur },\n          { label: \"Autonomie\", value: m.autonomie },\n        ],\n        attrsDetail: [\n          { label: \"Pénurie\", value: m.penurie },\n          { label: \"Évolution\", value: m.evolution },\n          { label: \"Compétences\", value: m.competences },\n        ],\n        expanded,\n        toggle: () => this.toggleCard(m.rank),\n        detailsLabel: expanded ? \"Masquer les détails\" : \"Voir détails\",\n      };\n    });\n\n    const cta = this.props.ctaColor ?? \"#A85D08\";\n    const sendDisabled = !this.state.rgpd;\n\n    return {\n      cards,\n      peurs: [\n        \"Conditions météo / intempéries\",\n        \"Charge de travail physique\",\n        \"Budget insuffisant\",\n        \"Accès à la terre\",\n      ],\n      cta,\n      modalOpen: this.state.modalOpen,\n      showForm: !this.state.sent,\n      sent: this.state.sent,\n      email: this.state.email,\n      rgpd: this.state.rgpd,\n      optin: this.state.optin,\n      error: this.state.error,\n      sendDisabled,\n      ctaBtn: sendDisabled ? \"#D9C3A8\" : cta,\n      sendCursor: sendDisabled ? \"not-allowed\" : \"pointer\",\n      openModal: () => this.setState({ modalOpen: true, sent: false, error: \"\" }),\n      closeModal: () => this.setState({ modalOpen: false, error: \"\" }),\n      stop: (e) => e.stopPropagation(),\n      onEmail: (e) => this.setState({ email: e.target.value, error: \"\" }),\n      toggleRgpd: (e) => this.setState({ rgpd: e.target.checked, error: \"\" }),\n      toggleOptin: (e) => this.setState({ optin: e.target.checked }),\n      submit: () => {\n        const ok = /^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$/.test(this.state.email);\n        if (!ok) { this.setState({ error: \"Veuillez saisir une adresse email valide.\" }); return; }\n        if (!this.state.rgpd) { this.setState({ error: \"Le consentement RGPD est requis.\" }); return; }\n        this.setState({ sent: true, error: \"\" });\n      },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
